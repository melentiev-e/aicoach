<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<title>Training Guide</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3344;
    --text: #e8eaed;
    --text2: #9ca3b4;
    --accent: #4ade80;
    --accent2: #22c55e;
    --rest: #6b7280;
    --easy: #60a5fa;
    --threshold: #f59e0b;
    --long: #a78bfa;
    --recovery: #34d399;
    --radius: 14px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html { font-size: 16px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    padding-bottom: calc(72px + var(--safe-bottom));
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    padding-top: max(12px, env(safe-area-inset-top));
  }
  .header h1 {
    font-size: 1.125rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .header .meta {
    font-size: 0.8rem;
    color: var(--text2);
    margin-top: 2px;
  }

  /* Main content */
  .main { padding: 12px 12px 0; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Cards */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
  }
  .card.today-card {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 4px 20px rgba(74, 222, 128, 0.08);
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .card-day {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text2);
  }
  .card-date {
    font-size: 0.75rem;
    color: var(--text2);
  }
  .card-type {
    font-size: 1.05rem;
    font-weight: 700;
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .card-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .meta-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.82rem;
    color: var(--text2);
  }
  .meta-chip .val {
    color: var(--text);
    font-weight: 600;
  }
  .card-purpose {
    margin-top: 8px;
    font-size: 0.82rem;
    color: var(--text2);
    font-style: italic;
  }

  /* Type badges */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .badge-rest { background: #374151; color: var(--rest); }
  .badge-easy { background: #1e3a5f; color: var(--easy); }
  .badge-threshold { background: #451a03; color: var(--threshold); }
  .badge-long { background: #3b1d5e; color: var(--long); }
  .badge-recovery { background: #064e3b; color: var(--recovery); }

  /* Week cards (compact) */
  .week-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
  }
  .week-card.today-card {
    background: var(--surface2);
    border-color: var(--accent);
  }
  .week-card .day-col {
    text-align: center;
    min-width: 44px;
    flex-shrink: 0;
  }
  .week-card .day-col .dow {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--text2);
    letter-spacing: 0.04em;
  }
  .week-card .day-col .dom {
    font-size: 1.25rem;
    font-weight: 800;
    line-height: 1.2;
  }
  .week-card.today-card .day-col .dom { color: var(--accent); }
  .week-card .info-col { flex: 1; min-width: 0; }
  .week-card .info-col .card-type { font-size: 0.9rem; margin-bottom: 2px; }
  .week-card .info-col .card-meta { font-size: 0.75rem; }
  .week-card .chevron {
    color: var(--text2);
    flex-shrink: 0;
    font-size: 1.1rem;
  }

  /* Detail view (overlay) */
  .detail-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--bg);
    transform: translateX(100%);
    transition: transform 0.25s ease;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .detail-overlay.open { transform: translateX(0); }
  .detail-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    padding-top: max(12px, env(safe-area-inset-top));
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .detail-back {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 1rem;
    font-weight: 600;
    padding: 8px;
    margin: -8px;
    cursor: pointer;
  }
  .detail-body { padding: 16px; }
  .detail-body .card { border: none; background: transparent; box-shadow: none; }

  /* Notes */
  .notes-section { margin-bottom: 16px; }
  .notes-section h3 {
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text2);
    margin-bottom: 8px;
    padding-left: 2px;
  }
  .notes-content {
    font-size: 0.88rem;
    line-height: 1.6;
    color: var(--text);
  }
  .notes-content p { margin-bottom: 10px; }
  .notes-content strong { color: var(--accent); }
  .notes-content em { color: var(--text2); }
  .notes-content ul, .notes-content ol {
    margin: 0 0 10px 20px;
  }
  .notes-content li { margin-bottom: 4px; }
  .notes-content code {
    background: var(--surface2);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 0.82em;
  }

  /* Tab bar */
  .tab-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 150;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: var(--safe-bottom);
  }
  .tab-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 8px 0 10px;
    background: none;
    border: none;
    color: var(--text2);
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-btn .tab-icon { font-size: 1.3rem; line-height: 1; }
  .tab-btn.active { color: var(--accent); }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60dvh;
    gap: 16px;
    color: var(--text2);
    font-size: 0.9rem;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-msg {
    text-align: center;
    padding: 40px 24px;
    color: var(--text2);
  }
  .error-msg h2 { font-size: 1rem; margin-bottom: 8px; color: var(--text); }
  .error-msg p { font-size: 0.85rem; margin-bottom: 16px; }
  .retry-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 10px 24px;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
  }

  /* Swipe hint */
  .swipe-hint {
    text-align: center;
    font-size: 0.72rem;
    color: var(--text2);
    padding: 4px 0 8px;
    opacity: 0.6;
  }

  /* Week total */
  .week-total {
    text-align: center;
    padding: 12px;
    font-size: 0.85rem;
    color: var(--text2);
  }
  .week-total strong { color: var(--accent); font-size: 1.1rem; }
</style>
</head>
<body>

<div class="header">
  <h1 id="header-title">Loading…</h1>
  <div class="meta" id="header-meta"></div>
</div>

<div class="main">
  <!-- Today tab -->
  <div class="tab-panel active" id="tab-today">
    <div class="loading" id="today-loading">
      <div class="spinner"></div>
      <span>Fetching your plan…</span>
    </div>
    <div id="today-content" style="display:none;"></div>
  </div>

  <!-- Week tab -->
  <div class="tab-panel" id="tab-week">
    <div class="swipe-hint">← swipe or tap a day →</div>
    <div id="week-content"></div>
    <div class="week-total" id="week-total"></div>
  </div>

  <!-- Notes tab -->
  <div class="tab-panel" id="tab-notes">
    <div id="notes-content"></div>
  </div>
</div>

<!-- Detail overlay -->
<div class="detail-overlay" id="detail">
  <div class="detail-header">
    <button class="detail-back" id="detail-back">‹ Back</button>
    <span id="detail-title" style="font-weight:700;"></span>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- Tab bar -->
<nav class="tab-bar">
  <button class="tab-btn active" data-tab="today">
    <span class="tab-icon">&#9632;</span>
    Today
  </button>
  <button class="tab-btn" data-tab="week">
    <span class="tab-icon">&#9776;</span>
    Week
  </button>
  <button class="tab-btn" data-tab="notes">
    <span class="tab-icon">&#9998;</span>
    Notes
  </button>
</nav>

<script>
(function() {
  'use strict';

  // ── Config ──────────────────────────────────────────────
  // Plan file lives in the same repo — use a relative path so the app
  // works on any deployment (GitHub Pages, Netlify, etc.)
  const MD_PATH = 'plan/current-week.md';
  const RAW_URL = MD_PATH;

  // ── State ───────────────────────────────────────────────
  let weekData = null;
  let todayIdx = -1;
  let activeTab = 'today';

  // ── Helpers ─────────────────────────────────────────────
  const $ = (s) => document.querySelector(s);
  const $$ = (s) => document.querySelectorAll(s);

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function todayDOM() {
    const d = new Date();
    return d.getDate();
  }

  function dayName(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'short' });
  }

  function badgeClass(type) {
    const t = type.toLowerCase();
    if (t.includes('rest')) return 'badge-rest';
    if (t.includes('threshold') || t.includes('tempo')) return 'badge-threshold';
    if (t.includes('long')) return 'badge-long';
    if (t.includes('recovery')) return 'badge-recovery';
    return 'badge-easy';
  }

  // ── Parse markdown ──────────────────────────────────────
  function parseWeek(md) {
    const lines = md.split('\n');
    const result = { title: '', phase: '', commits: '', days: [], notes: {}, total: '' };

    // Extract title metadata
    let i = 0;
    // Skip header lines (# and >)
    while (i < lines.length && (lines[i].startsWith('#') || lines[i].startsWith('>'))) {
      if (lines[i].startsWith('#')) result.title = lines[i].replace(/^#\s+/, '').trim();
      i++;
    }

    // Extract context lines
    while (i < lines.length && lines[i].startsWith('- ')) {
      const line = lines[i].replace(/^- /, '').trim();
      if (line.includes('Phase:')) result.phase = line.replace(/.*Phase:\s*/, '').trim();
      if (line.includes('Committed:')) result.commits = line.replace(/.*Committed:\s*/, '').trim();
      i++;
    }

    // Skip blank lines until table
    while (i < lines.length && !lines[i].includes('|')) i++;

    // Parse table
    if (i < lines.length && lines[i].includes('|')) {
      i++; // skip header
      i++; // skip separator
      while (i < lines.length && lines[i].includes('|')) {
        const cells = lines[i].split('|').filter(c => c.trim()).map(c => c.trim());
        if (cells.length >= 6) {
          // date | type | distance | pace | hr | purpose
          const dateMatch = cells[0].match(/^(\d{4}-\d{2}-\d{2})/);
          result.days.push({
            date: dateMatch ? dateMatch[1] : cells[0],
            fullDate: cells[0],
            type: cells[1],
            distance: cells[2],
            pace: cells[3],
            hr: cells[4],
            purpose: cells[5]
          });
        }
        i++;
      }
    }

    // Skip to week total
    while (i < lines.length && !lines[i].match(/Week total|week total/)) i++;
    if (i < lines.length) {
      result.total = lines[i].replace(/[^0-9.kmKm]/g, '').trim();
      // Get the full line for display
      result.totalDisplay = lines[i].trim();
    }

    // Parse sections after ---
    i++;
    const sections = ['Session notes', 'Shin check', 'Strength prescription', 'Fueling note', 'Sleep note', 'Shoes', 'Taper note'];
    let currentSection = null;
    let currentLines = [];

    function flushSection() {
      if (currentSection && currentLines.length) {
        result.notes[currentSection] = currentLines.join('\n').trim();
      }
    }

    while (i < lines.length) {
      const line = lines[i];
      const headingMatch = line.match(/^##\s+(.+)/);
      if (headingMatch) {
        flushSection();
        currentSection = headingMatch[1].trim();
        currentLines = [];
        i++;
        continue;
      }
      if (currentSection) {
        if (line.startsWith('- ') || line.startsWith('  ') || line.startsWith('* ') || line.trim()) {
          currentLines.push(line.replace(/^(\s*[-*]?\s*)?/, ''));
        }
      }
      i++;
    }
    flushSection();

    return result;
  }

  // ── Render ──────────────────────────────────────────────
  function renderToday() {
    if (todayIdx < 0 || !weekData.days[todayIdx]) return;
    const day = weekData.days[todayIdx];
    const container = $('#today-content');
    const loading = $('#today-loading');

    const isRest = day.type.toLowerCase().includes('rest');
    const typeBadge = `<span class="badge ${badgeClass(day.type)}">${day.type}</span>`;

    let html = `
      <div class="card today-card">
        <div class="card-header">
          <span class="card-day">${day.fullDate}</span>
          ${typeBadge}
        </div>
        <div class="card-type">${isRest ? 'Rest Day' : day.type}</div>
        <div class="card-meta">
          ${!isRest ? `
            <span class="meta-chip">📏 <span class="val">${day.distance}</span></span>
            <span class="meta-chip">⏱ <span class="val">${day.pace}</span></span>
            <span class="meta-chip">❤️ <span class="val">${day.hr}</span></span>
          ` : `
            <span class="meta-chip" style="color:var(--rest);">Recover & rebuild</span>
          `}
        </div>
        ${!isRest ? `<div class="card-purpose">${day.purpose}</div>` : ''}
      </div>`;

    // Show session notes for today if they exist
    const todayNotes = getTodayNotes();
    if (todayNotes) {
      html += `<div class="card"><div class="notes-content">${todayNotes}</div></div>`;
    }

    container.innerHTML = html;
    loading.style.display = 'none';
    container.style.display = 'block';
  }

  function getTodayNotes() {
    if (todayIdx < 0) return null;
    const day = weekData.days[todayIdx];
    const dateNum = day.date.split('-')[2]; // "18"

    // Check session notes for matching day
    const sn = weekData.notes['Session notes'] || '';
    // Look for patterns like "**Thursday threshold**" or "**Thu**"
    const todayDayName = day.fullDate.split(' ')[1] || '';
    const patterns = [
      `**${todayDayName}`,
      `**${dateNum}`,
    ];

    for (const pattern of patterns) {
      const idx = sn.indexOf(pattern);
      if (idx >= 0) {
        // Extract until next ** or end
        let end = sn.indexOf('**', idx + pattern.length);
        if (end < 0) end = sn.length;
        // Get the full note including the title
        const noteStart = sn.lastIndexOf('\n', idx - 1) + 1;
        const noteEnd = sn.indexOf('\n\n', end);
        const fullNote = sn.substring(noteStart, noteEnd > 0 ? noteEnd : undefined);
        return fullNote.replace(/\*\*/g, '').replace(/^[-*]\s*/, '');
      }
    }
    return null;
  }

  function renderWeek() {
    const container = $('#week-content');
    let html = '';

    weekData.days.forEach((day, idx) => {
      const isToday = idx === todayIdx;
      const isRest = day.type.toLowerCase().includes('rest');
      html += `
        <div class="card week-card${isToday ? ' today-card' : ''}" data-idx="${idx}" role="button" tabindex="0">
          <div class="day-col">
            <div class="dow">${dayName(day.date)}</div>
            <div class="dom">${parseInt(day.date.split('-')[2])}</div>
          </div>
          <div class="info-col">
            <div class="card-type">${isRest ? 'Rest' : day.type}</div>
            <div class="card-meta">
              <span class="meta-chip">${day.distance}</span>
              ${!isRest ? `<span class="meta-chip">${day.pace}</span>` : ''}
            </div>
          </div>
          <span class="chevron">›</span>
        </div>`;
    });

    container.innerHTML = html;

    // Week total
    if (weekData.totalDisplay) {
      $('#week-total').innerHTML = `<strong>${weekData.totalDisplay}</strong>`;
    }

    // Tap handlers
    container.querySelectorAll('.week-card').forEach(card => {
      card.addEventListener('click', () => {
        const idx = parseInt(card.dataset.idx);
        openDetail(idx);
      });
    });
  }

  function renderNotes() {
    const container = $('#notes-content');
    let html = '';

    const sectionOrder = ['Session notes', 'Shin check', 'Strength prescription', 'Fueling note', 'Sleep note', 'Shoes', 'Taper note'];
    const labels = {
      'Session notes': '📋 Session Notes',
      'Shin check': '🦵 Shin Check',
      'Strength prescription': '💪 Strength',
      'Fueling note': '⚡ Fueling',
      'Sleep note': '😴 Sleep',
      'Shoes': '👟 Shoes',
      'Taper note': '📉 Taper',
    };

    for (const section of sectionOrder) {
      // Match by prefix so headings with a parenthetical suffix still render
      // e.g. "## Shin check (active — tension reported)" → "Shin check"
      const key = Object.keys(weekData.notes).find(k => k === section || k.startsWith(section));
      const text = key ? weekData.notes[key] : null;
      if (!text) continue;

      html += `
        <div class="notes-section">
          <h3>${labels[section] || section}</h3>
          <div class="notes-content">${formatNoteText(text)}</div>
        </div>`;
    }

    // If no notes found, show the raw context if available
    if (!html) {
      html = '<div class="card" style="text-align:center;color:var(--text2);">No additional notes this week.</div>';
    }

    container.innerHTML = html;
  }

  function formatNoteText(text) {
    // Convert markdown-like formatting to HTML
    return text
      .split('\n')
      .filter(l => l.trim())
      .map(line => {
        line = line.trim();
        if (line.startsWith('- ')) {
          return `<li>${inlineFormat(line.replace(/^- /, ''))}</li>`;
        }
        if (line.startsWith('  ')) {
          return `<li style="margin-left:16px;">${inlineFormat(line.replace(/^  /, ''))}</li>`;
        }
        if (line.startsWith('* ')) {
          return `<li>${inlineFormat(line.replace(/^\* /, ''))}</li>`;
        }
        return `<p>${inlineFormat(line)}</p>`;
      })
      .join('\n');
  }

  function inlineFormat(text) {
    // Bold
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic
    text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
    return text;
  }

  function renderAll() {
    if (!weekData) return;
    renderToday();
    renderWeek();
    renderNotes();
  }

  // ── Detail overlay ──────────────────────────────────────
  function openDetail(idx) {
    const day = weekData.days[idx];
    const isRest = day.type.toLowerCase().includes('rest');
    $('#detail-title').textContent = `${day.fullDate}`;

    let html = `
      <div class="card today-card">
        <div class="card-header">
          <span class="card-day">${day.fullDate}</span>
          <span class="badge ${badgeClass(day.type)}">${day.type}</span>
        </div>
        <div class="card-type">${isRest ? 'Rest Day' : day.type}</div>
        <div class="card-meta">
          ${!isRest ? `
            <span class="meta-chip">📏 <span class="val">${day.distance}</span></span>
            <span class="meta-chip">⏱ <span class="val">${day.pace}</span></span>
            <span class="meta-chip">❤️ <span class="val">${day.hr}</span></span>
          ` : '<span class="meta-chip" style="color:var(--rest);">Recover & rebuild</span>'}
        </div>
        ${!isRest ? `<div class="card-purpose">${day.purpose}</div>` : ''}
      </div>`;

    // Session note for this day
    const todayNotes = getNoteForDay(idx);
    if (todayNotes) {
      html += `<div class="card"><div class="notes-content">${todayNotes}</div></div>`;
    }

    $('#detail-body').innerHTML = html;
    $('#detail').classList.add('open');
  }

  function getNoteForDay(idx) {
    const day = weekData.days[idx];
    const dateNum = day.date.split('-')[2];
    const todayDayName = day.fullDate.split(' ')[1] || '';
    const sn = weekData.notes['Session notes'] || '';

    const patterns = [`**${todayDayName}`, `**${dateNum}`];
    for (const pattern of patterns) {
      const pIdx = sn.indexOf(pattern);
      if (pIdx >= 0) {
        const noteStart = sn.lastIndexOf('\n', pIdx - 1) + 1;
        const noteEnd = sn.indexOf('\n\n', pIdx);
        const fullNote = sn.substring(noteStart, noteEnd > 0 ? noteEnd : undefined);
        return fullNote.replace(/\*\*/g, '').replace(/^[-*]\s*/, '');
      }
    }
    return null;
  }

  function closeDetail() {
    $('#detail').classList.remove('open');
  }

  // ── Tabs ────────────────────────────────────────────────
  function switchTab(tab) {
    activeTab = tab;
    $$('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    $$('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `tab-${tab}`));
  }

  // ── Swipe ───────────────────────────────────────────────
  let touchStartX = 0;
  let touchStartY = 0;

  document.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].screenX - touchStartX;
    const dy = e.changedTouches[0].screenY - touchStartY;

    // Only horizontal swipes
    if (Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy)) return;

    // Don't handle if detail overlay is open
    if ($('#detail').classList.contains('open')) return;

    if (dx < 0 && activeTab === 'week') {
      // Swipe left → next day
      const cards = $('#week-content').querySelectorAll('.week-card');
      // Find currently visible card (simple: swipe from card area)
      return; // Swipe between tabs for now
    }
    if (dx > 0 && activeTab === 'week') {
      return;
    }

    // Tab-level swipe
    const tabs = ['today', 'week', 'notes'];
    const currentIdx = tabs.indexOf(activeTab);
    if (dx < 0 && currentIdx < tabs.length - 1) {
      switchTab(tabs[currentIdx + 1]);
    } else if (dx > 0 && currentIdx > 0) {
      switchTab(tabs[currentIdx - 1]);
    }
  }, { passive: true });

  // ── Init ────────────────────────────────────────────────
  async function init() {
    try {
      const resp = await fetch(RAW_URL);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const md = await resp.text();
      weekData = parseWeek(md);

      // Find today
      const today = todayStr();
      todayIdx = weekData.days.findIndex(d => d.date === today);
      if (todayIdx < 0) {
        // Find the closest upcoming or most recent day
        todayIdx = weekData.days.findIndex(d => d.date >= today);
        if (todayIdx < 0) todayIdx = weekData.days.length - 1;
      }

      // Header
      $('#header-title').textContent = weekData.title || 'Training Plan';
      const parts = [];
      if (weekData.phase) parts.push(weekData.phase);
      if (weekData.commits) parts.push(`Updated ${weekData.commits}`);
      $('#header-meta').textContent = parts.join(' · ');

      renderAll();

      // Auto-select Today tab
      switchTab('today');
    } catch (err) {
      console.error('Failed to load plan:', err);
      $('#today-loading').innerHTML = `
        <h2>Couldn't load your plan</h2>
        <p>${err.message}. Make sure <code>${MD_PATH}</code> exists in the repo.</p>
        <button class="retry-btn" onclick="location.reload()">Retry</button>`;
    }
  }

  // ── Event listeners ─────────────────────────────────────
  $$('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  $('#detail-back').addEventListener('click', closeDetail);
  $('#detail').addEventListener('click', (e) => {
    if (e.target === $('#detail')) closeDetail();
  });

  // Keyboard: Escape closes detail
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeDetail();
  });

  // Start
  if (typeof marked !== 'undefined') {
    marked.setOptions({ breaks: true, gfm: true });
    init();
  } else {
    // marked.js hasn't loaded yet, wait for it
    window.addEventListener('load', () => {
      if (typeof marked !== 'undefined') {
        marked.setOptions({ breaks: true, gfm: true });
        init();
      } else {
        $('#today-loading').innerHTML = `
          <h2>App failed to load</h2>
          <p>Could not load the markdown parser. Check your internet connection.</p>`;
      }
    });
  }
})();
</script>
</body>
</html>
